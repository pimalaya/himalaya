[package]
name = "himalaya"
description = "CLI to manage emails"
version = "1.2.0"
authors = ["Clément DOUIN <pimalaya.org@posteo.net>"]
edition = "2021"
license = "MIT"
categories = ["command-line-utilities", "email"]
keywords = ["cli", "email", "imap", "maildir", "smtp"]
homepage = "https://pimalaya.org"
documentation = "https://github.com/pimalaya/himalaya"
repository = "https://github.com/pimalaya/himalaya"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["imap", "smtp", "rustls-ring"]

imap = ["dep:io-imap", "dep:mail-parser", "dep:rfc2047-decoder", "pimalaya-toolbox/imap", "io-email/imap"]
jmap = ["dep:io-jmap", "dep:mail-parser", "dep:serde_json", "pimalaya-toolbox/jmap", "io-email/jmap"]
smtp = ["dep:io-smtp", "dep:mail-parser", "pimalaya-toolbox/smtp", "io-email/smtp"]
maildir = ["dep:convert_case", "dep:io-maildir", "dep:mail-parser", "dep:mime_guess", "io-email/maildir"]

native-tls = ["pimalaya-toolbox/native-tls"]
rustls-aws = ["pimalaya-toolbox/rustls-aws"]
rustls-ring = ["pimalaya-toolbox/rustls-ring"]

vendored = ["pimalaya-toolbox/vendored"]

[build-dependencies]
pimalaya-toolbox = { version = "0.0.4", default-features = false, features = ["build"] }

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false }
clap = { version = "4.4", features = ["derive", "env", "wrap_help"] }
comfy-table = "7"
convert_case = { version = "0.11", optional = true }
dirs = "6"
gethostname = "1"
io-email = { version = "0.0.1", default-features = false, features = ["serde"] }
io-imap = { version = "0.0.1", default-features = false, optional = true }
io-jmap = { version = "0.0.1", default-features = false, optional = true }
io-maildir = { version = "0.0.1", default-features = false, features = ["serde"], optional = true }
io-process = { version = "0.0.2", default-features = false }
io-smtp = { version = "0.0.1", default-features = false, optional = true }
log = "0.4"
mail-builder = "0.3"
mail-parser = { version = "0.11", features = ["serde"], optional = true }
mime_guess = { version = "2", optional = true }
open = "5"
pimalaya-toolbox = { version = "0.0.4", default-features = false, features = ["config", "terminal", "secret", "sasl", "stream"] }
rfc2047-decoder = { version = "1", optional = true }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", optional = true }
shellexpand = "3.1"
url = { version = "2.2", features = ["serde"] }

[target.'cfg(windows)'.dependencies]
uds_windows = "1"

[dev-dependencies]
assert_cmd = "2"
io-jmap = { version = "0.0.1", default-features = false }
serde = "1"
serde_json = "1"
tempfile = "3"

[patch.crates-io]
io-email.path = "../io-email"
io-http.git = "https://github.com/pimalaya/io-http"
io-imap = { git = "https://github.com/pimalaya/io-imap", branch = "io" }
io-jmap.git = "https://github.com/pimalaya/io-jmap"
io-maildir.path = "../io-maildir"
io-smtp.git = "https://github.com/pimalaya/io-smtp"
pimalaya-toolbox.git = "https://github.com/pimalaya/toolbox"
